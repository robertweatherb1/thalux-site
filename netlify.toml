# Netlify config for Thalux AI site
# Deployed from ~/projects/thalux-site/
#
# DEPLOYMENT RULE: Production = `production` branch only.
# `main` branch generates deploy previews for visual QC before any live push.
# Robert MUST approve the deploy preview URL before anything goes to production.

[build]
  command = "npm run build"
  publish = "dist/"

[build.processing]
  skip_processing = false

# ── Deploy Preview Context ──────────────────────────────────────────────
# Pushes to any branch (including `main`) generate preview URLs:
#   https://main--thalux-ai.netlify.app
# These DO NOT affect production — they're for visual QC and inspection only.

[context.deploy-preview]
  command = "npm run build"

[context.branch-deploy]
  command = "npm run build"

# ── Production Context ──────────────────────────────────────────────────
# Production deploys ONLY from the `production` branch.
# After QC approval: git push origin main:production

[context.production]
  command = "npm run build"
  environment = { PRODUCTION = "true" }

# ── Redirects ───────────────────────────────────────────────────────────

[[redirects]]
  from = "/services/*"
  to = "/data/govcon-intel"
  status = 301

[[redirects]]
  from = "/data/fdic-bankintel"
  to = "/data/govcon-intel"
  status = 301
  force = true

[[redirects]]
  from = "/data/fdic-bankintel/*"
  to = "/data/govcon-intel"
  status = 301
  force = true

[[redirects]]
  from = "/data/foreclosure-intel"
  to = "/data/govcon-intel"
  status = 301

[[redirects]]
  from = "/data/osha-compliance"
  to = "/data/govcon-intel"
  status = 301

[[redirects]]
  from = "/data/commercial-permits"
  to = "/data/govcon-intel"
  status = 301

[[redirects]]
  from = "/api/portal"
  to = "/.netlify/functions/portal"
  status = 200

[[redirects]]
  from = "/api/portal/*"
  to = "/.netlify/functions/portal"
  status = 200

[[redirects]]
  from = "/admin/invoices"
  to = "/.netlify/functions/admin-invoices"
  status = 200

[[redirects]]
  from = "/api/create-checkout"
  to = "/.netlify/functions/create-checkout"
  status = 200

[[redirects]]
  from = "/api/stripe-webhook"
  to = "/.netlify/functions/stripe-webhook"
  status = 200

[[redirects]]
  from = "/api/download/bankintel"
  to = "/.netlify/functions/download-bankintel"
  status = 200

[[redirects]]
  from = "/api/download/bankintel/*"
  to = "/.netlify/functions/download-bankintel"
  status = 200